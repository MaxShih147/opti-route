<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>opti-route</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ffffff'/><g fill='none' stroke='%23000000' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><rect x='5' y='7' width='22' height='14' rx='2.5'/><line x1='5' y1='13' x2='27' y2='13'/><line x1='11.5' y1='7' x2='11.5' y2='13'/><line x1='20.5' y1='7' x2='20.5' y2='13'/></g><circle cx='10' cy='24' r='2' fill='%23000000'/><circle cx='22' cy='24' r='2' fill='%23000000'/></svg>" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="brand">
        <h1>opti-route</h1>
        <p class="tagline">公車路線與站點設置規劃</p>
        <a class="brand-about" href="/about">about</a>
      </header>

      <details class="panel" open>
        <summary><h2>城市生成</h2><span class="chevron"></span></summary>
        <div class="panel-body">
          <div class="grid2">
            <label>城市規模<input id="g-scale" type="number" value="192" min="16" max="900" step="1" /></label>
            <label>乘客點數<input id="g-pass" type="number" value="100" min="20" max="500" /></label>
            <label>畸零度<input id="g-drop" type="number" value="15" min="0" max="50" step="1" /></label>
            <label>禁區數<input id="g-forb" type="number" value="2" min="0" max="6" /></label>
          </div>
          <button id="btn-regen" class="primary block">生成城市</button>
        </div>
      </details>

      <!-- 編輯模式 panel hidden per request — kept in source for easy restore.
      <details class="panel" open>
        <summary><h2>編輯模式</h2><span class="chevron"></span></summary>
        <div class="panel-body">
          <div class="modes">
            <button class="mode active" data-mode="none">瀏覽</button>
            <button class="mode" data-mode="set_source">移動 A</button>
            <button class="mode" data-mode="set_sink">移動 B</button>
            <button class="mode" data-mode="add_passenger">+ 乘客</button>
            <button class="mode" data-mode="delete_passenger">− 乘客</button>
          </div>
          <p class="hint">點地圖節點放置；乘客會自動 snap 到最近節點。</p>
        </div>
      </details>
      -->


      <details class="panel" open>
        <summary><h2>成本參數</h2><span class="chevron"></span></summary>
        <div class="panel-body">
          <div class="grid2">
            <label>K · 最多站數<input id="p-k" type="number" value="5" min="1" max="10" step="1" /></label>
            <label>α · 路線權重<input id="p-alpha" type="number" value="1.0" min="0" max="5" step="0.1" /></label>
            <label>β · 步行權重<input id="p-beta" type="number" value="1.0" min="0" max="5" step="0.1" /></label>
            <label>站建設成本<input id="p-stop" type="number" value="50" min="0" max="500" step="1" /></label>
          </div>
        </div>
      </details>

      <!-- KSP 進階參數 panel hidden per request — kept in source for easy restore.
      <details class="panel">
        <summary><h2>KSP 進階</h2><span class="chevron"></span></summary>
        <div class="panel-body">
          <label class="slider">
            <span>k_paths · 候選路徑數 <em id="lbl-kp">6</em></span>
            <input id="p-kp" type="range" min="1" max="20" value="6" />
          </label>
          <label class="slider">
            <span>corridor_hops · 走廊寬度 <em id="lbl-corr">3</em></span>
            <input id="p-corr" type="range" min="0" max="5" value="3" />
          </label>
          <p class="hint">corridor 越大 → KSP 越敢繞去服務乘客；實測 hops=3 為甜點。</p>
        </div>
      </details>
      -->

      <details class="panel" open>
        <summary><h2>求解</h2><span class="chevron"></span></summary>
        <div class="panel-body">
          <div class="solvers">
            <button class="solver" data-algo="ksp">
              <span class="badge ksp">K</span>
              <span class="solv-name">K-最短路徑啟發式</span>
              <span class="solv-desc">Yen's algorithm + 走廊 p-median facility location</span>
            </button>
            <button class="solver" data-algo="mip">
              <span class="badge mip">M</span>
              <span class="solv-name">混合整數規劃 (MILP)</span>
              <span class="solv-desc">OR-Tools CP-SAT · MTZ subtour elimination</span>
            </button>
          </div>
        </div>
      </details>

      <details class="panel" open>
        <summary><h2>結果比較</h2><span class="chevron"></span></summary>
        <div class="panel-body">
          <div id="results-empty" class="empty">尚未求解</div>
          <div id="results-table"></div>
        </div>
      </details>

    </aside>

    <main class="viewport">
      <div class="toolbar">
        <div class="status" id="status">Ready</div>

        <details class="legend-box" open>
          <summary class="legend-head">
            <span>圖例</span>
            <span class="chevron"></span>
          </summary>
          <div class="legend-grid">
            <div><span class="dot src"></span>A 起點</div>
            <div><span class="dot sink"></span>B 終點</div>
            <div><span class="dot pass"></span>乘客</div>
            <div><span class="dot stop"></span>站牌</div>
            <div><span class="dot forb"></span>禁區</div>
            <div><span class="swatch route"></span>公車路線</div>
            <div><span class="swatch arterial"></span>快速道路</div>
            <div><span class="swatch street"></span>一般道路</div>
            <div><span class="swatch terrain-lo"></span>地形便宜</div>
            <div><span class="swatch terrain-hi"></span>地形昂貴</div>
          </div>
        </details>
      </div>
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
    </main>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
